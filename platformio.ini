; PlatformIO project for the Waveshare ESP32-C6 1.47" Bosch TPMS reader.
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; The ESP32-C6 needs Arduino-ESP32 core 3.x (ESP-IDF 5.x). The official
; platformio/espressif32 platform lagged on core 2.x and does NOT support the
; C6 on the Arduino framework, so we use the community pioarduino fork below.

[env:esp32-c6-devkitm-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
; WiFi + BLE + LVGL doesn't fit the default 1.3MB app partition; the board has
; 4MB flash, so use the 3MB no-OTA app partition table from the core.
board_build.partitions = huge_app.csv
monitor_speed = 115200
monitor_filters = time

; Embed the web config page: scripts/embed_html.sh generates
; include/config_page.h from web/config.html before each build (edit the HTML
; file, not the header). The .py is a shim — extra_scripts must be Python.
extra_scripts = pre:scripts/embed_html.py

lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
    moononournation/GFX Library for Arduino@^1.4.9
    lvgl/lvgl@^9.5.0
    bblanchon/ArduinoJson@^7.4.0

; old.cpp is the previous serial-only sketch (kept for reference); it also
; defines setup()/loop(), so keep it out of the build.
build_src_filter =
    +<*>
    -<old.cpp>
    -<sample>

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1   ; serial over the native USB-C port
    -DARDUINO_USB_MODE=1
    ; LVGL config (no lv_conf.h needed; defaults + these overrides)
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_FONT_MONTSERRAT_8=1
    -DLV_FONT_MONTSERRAT_10=1
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_FONT_MONTSERRAT_34=1

; Static analysis: `pio check -e esp32-c6-devkitm-1` (needs `brew install cppcheck`).
check_tool = cppcheck
check_flags =
    cppcheck: --enable=warning,style,performance,portability --inline-suppr --suppress=*:*/.pio/*
check_src_filters =
    +<src/>
    +<include/>
check_skip_packages = yes   ; don't lint NimBLE / GFX library sources
